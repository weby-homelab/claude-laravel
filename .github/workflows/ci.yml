name: Validate Configurations

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-json:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate settings.json
        run: jq empty .claude/settings.json
        
      - name: Validate .mcp.json
        run: jq empty .mcp.json

  validate-agents:
    name: Validate Agent YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install yamllint
        run: sudo apt-get update && sudo apt-get install -y yamllint
        
      - name: Validate YAML frontmatter in agents
        run: |
          ERROR=0
          for file in .claude/agents/*.md; do
            echo "Checking $file..."
            # Extract yaml frontmatter block and lint it
            sed -n '1 {/^---$/!q;}; /^---$/,/^---$/p' "$file" > tmp.yaml
            
            # If the file has valid frontmatter, lint it
            if [ -s tmp.yaml ]; then
              yamllint -d "{extends: relaxed, rules: {line-length: disable, document-start: disable}}" tmp.yaml || ERROR=1
            else
              echo "Warning: No YAML frontmatter found in $file"
            fi
          done
          rm -f tmp.yaml
          exit $ERROR

  validate-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-action@v0.4.0
        with:
          globs: "**/*.md"
          # Ignore some common formatting rules that are too strict for Claude configs
          args: "--disable MD013 MD033 MD041 MD024 MD034 MD029 MD036"
